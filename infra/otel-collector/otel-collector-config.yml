receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 2s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  # ES 전송 전 불필요한 resource 속성 제거
  transform/clean_for_es:
    log_statements:
      - context: resource
        statements:
          - delete_key(attributes, "process.command_args")
          - delete_key(attributes, "process.command_line")
          - delete_key(attributes, "process.executable.path")
          - delete_key(attributes, "process.runtime.description")
          - delete_key(attributes, "process.runtime.name")
          - delete_key(attributes, "process.runtime.version")
          - delete_key(attributes, "process.pid")
          - delete_key(attributes, "os.description")
          - delete_key(attributes, "os.type")
          - delete_key(attributes, "host.arch")
          - delete_key(attributes, "telemetry.distro.name")
          - delete_key(attributes, "telemetry.distro.version")
          - delete_key(attributes, "telemetry.sdk.language")
          - delete_key(attributes, "telemetry.sdk.name")
          - delete_key(attributes, "telemetry.sdk.version")

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  elasticsearch:
    endpoint: http://elasticsearch:9200
    logs_index: otel-logs
    pipeline: otel-logs-pipeline   # ES Ingest Pipeline 으로 필드 평탄화

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/tempo, debug]
    logs/loki:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/loki]
    logs/es:
      receivers: [otlp]
      processors: [batch, resource, transform/clean_for_es]
      exporters: [elasticsearch, debug]