apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      # OTLP 로 수신된 로그는 trace_id 가 structured metadata 로 저장됨.
      # matcherType: label 은 log body 가 아닌 라벨/메타데이터에서 값을 추출함.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View Trace

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      # Trace 상세 화면 → Loki 로그 연동
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
        tags:
          - key: service.name
            value: service_name
      nodeGraph:
        enabled: true
      # Loki 에서 검색 버튼으로 Tempo 로 이동
      lokiSearch:
        datasourceUid: loki
