apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      # OTLP 로 수신된 로그는 trace_id 가 structured metadata 로 저장됨.
      # matcherType: label 은 log body 가 아닌 라벨/메타데이터에서 값을 추출함.
      derivedFields:
        - name: TraceID
          matcherType: label
          matcherRegex: trace_id
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: View Trace
