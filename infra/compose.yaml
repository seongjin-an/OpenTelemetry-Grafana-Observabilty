services:

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - "13100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./.data/loki:/loki
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "13200:3200"
      - "14317:4317"
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo.yml:ro
      - ./.data/tempo:/var/tempo

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./.data/grafana:/var/lib/grafana
    depends_on:
      - loki
      - tempo

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    restart: unless-stopped
    ports:
      - "19200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # 로컬 개발용
      - xpack.ml.enabled=false         # ML 비활성화 — 메모리 절약
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # 힙 512MB 고정 (기본값 4GB)
      - cluster.routing.allocation.disk.threshold_enabled=false  # 로컬 디스크 워터마크 체크 비활성화
    volumes:
      - ./.data/elasticsearch:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    restart: unless-stopped
    ports:
      - "15601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - NODE_OPTIONS=--max-old-space-size=512  # Node.js 힙 512MB
    depends_on:
      - elasticsearch

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector-config.yml"]
    ports:
      - "24317:4317"
      - "24318:4318"
      - "28888:8888"
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol/otel-collector-config.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - tempo
      - loki
      - elasticsearch